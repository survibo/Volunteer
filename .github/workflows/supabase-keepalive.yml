name: Supabase Keepalive

on:
  schedule:
    # Supabase free projects can pause after 7 days of inactivity.
    # Run twice a week so month boundaries or delayed jobs do not exceed 6 days.
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase Auth health endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
        run: |
          test -n "$SUPABASE_URL"

          BASE_URL="${SUPABASE_URL%/}"

          curl --fail --silent --show-error "$BASE_URL/auth/v1/health"
