name: Supabase Keepalive

on:
  schedule:
    # Supabase free projects can pause after 7 days of inactivity.
    # Run twice a week so month boundaries or delayed jobs do not exceed 6 days.
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_PUBLISHABLE_KEY"

          curl --fail --silent --show-error \
            --header "apikey: $SUPABASE_PUBLISHABLE_KEY" \
            --header "Authorization: Bearer $SUPABASE_PUBLISHABLE_KEY" \
            "$SUPABASE_URL/rest/v1/"
