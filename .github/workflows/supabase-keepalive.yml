name: Supabase Keepalive

on:
  schedule:
    # Supabase free projects can pause after 7 days of inactivity.
    # Run twice a week so month boundaries or delayed jobs do not exceed 6 days.
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase Auth & REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -e
          BASE_URL="${SUPABASE_URL%/}"

          echo "--- Auth health ---"
          curl --fail --silent --show-error "$BASE_URL/auth/v1/health"

          echo ""
          echo "--- REST API (push_config) ---"
          curl --fail --silent --show-error --output /dev/null -w "HTTP %{http_code}\n" \
            "$BASE_URL/rest/v1/push_config?select=key&limit=1" \
            -H "apikey: $SUPABASE_KEY"
